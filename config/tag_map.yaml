# CNH Arbortext XML → HTML tag mapping
#
# Each entry can specify:
#   html_tag    — target HTML element
#   unwrap      — replace element with its content (drop the tag)
#   strip       — remove element and all children
#   attrs       — static HTML attributes
#   attrs_from  — map HTML attrs from XML attrs: {html_attr: xml_attr}
#   prefix      — text to prepend inside the element
#   suffix      — text to append inside the element
#   list_context — ol|ul — consecutive siblings need wrapping
#   handler     — name of special-case handler function

