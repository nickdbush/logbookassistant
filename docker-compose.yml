services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    volumes:
      - ./data/qdrant_storage:/qdrant/storage:ro
    restart: unless-stopped

  api:
    build: ./runtime
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data:ro
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DATA_DIR=/app/data
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
